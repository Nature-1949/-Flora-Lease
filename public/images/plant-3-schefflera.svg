<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2f1"/>
      <stop offset="100%" stop-color="#b2dfdb"/>
    </linearGradient>
    <linearGradient id="leaf3a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
    <linearGradient id="leaf3b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#43a047"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg3)" rx="20"/>
  <!-- Pot -->
  <path d="M150 340 L158 385 L242 385 L250 340 Z" fill="#5d4037"/>
  <rect x="143" y="330" width="114" height="16" rx="6" fill="#795548"/>
  <!-- Trunk -->
  <path d="M200 330 C200 290 195 260 200 220 C205 180 200 150 200 130" stroke="#5d4037" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Umbrella-like schefflera leaves -->
  <g transform="translate(200,130)">
    <!-- Leaf stems radiating out -->
    <line x1="0" y1="0" x2="-60" y2="-50" stroke="#388e3c" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="60" y2="-50" stroke="#388e3c" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-80" y2="-15" stroke="#388e3c" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="80" y2="-15" stroke="#388e3c" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="-70" stroke="#388e3c" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-35" y2="-65" stroke="#388e3c" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="35" y2="-65" stroke="#388e3c" stroke-width="3" stroke-linecap="round"/>
    <!-- Oval leaves at tips -->
    <ellipse cx="-60" cy="-50" rx="25" ry="12" fill="url(#leaf3a)" transform="rotate(-40 -60 -50)"/>
    <ellipse cx="60" cy="-50" rx="25" ry="12" fill="url(#leaf3b)" transform="rotate(40 60 -50)"/>
    <ellipse cx="-80" cy="-15" rx="28" ry="12" fill="url(#leaf3b)" transform="rotate(-10 -80 -15)"/>
    <ellipse cx="80" cy="-15" rx="28" ry="12" fill="url(#leaf3a)" transform="rotate(10 80 -15)"/>
    <ellipse cx="0" cy="-70" rx="22" ry="12" fill="#388e3c"/>
    <ellipse cx="-35" cy="-65" rx="22" ry="11" fill="url(#leaf3a)" transform="rotate(-25 -35 -65)"/>
    <ellipse cx="35" cy="-65" rx="22" ry="11" fill="url(#leaf3b)" transform="rotate(25 35 -65)"/>
  </g>
  <!-- Second cluster lower -->
  <g transform="translate(200,200) scale(0.7)">
    <line x1="0" y1="0" x2="-55" y2="-45" stroke="#388e3c" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="55" y2="-45" stroke="#388e3c" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-70" y2="-10" stroke="#388e3c" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="70" y2="-10" stroke="#388e3c" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="-60" stroke="#388e3c" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="-55" cy="-45" rx="22" ry="10" fill="url(#leaf3a)" transform="rotate(-40 -55 -45)"/>
    <ellipse cx="55" cy="-45" rx="22" ry="10" fill="url(#leaf3b)" transform="rotate(40 55 -45)"/>
    <ellipse cx="-70" cy="-10" rx="24" ry="10" fill="url(#leaf3b)" transform="rotate(-10 -70 -10)"/>
    <ellipse cx="70" cy="-10" rx="24" ry="10" fill="url(#leaf3a)" transform="rotate(10 70 -10)"/>
    <ellipse cx="0" cy="-60" rx="20" ry="10" fill="#388e3c"/>
  </g>
  <circle cx="280" cy="80" r="60" fill="white" opacity="0.07"/>
</svg>