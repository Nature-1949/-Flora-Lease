  </defs>
  <rect width="400" height="400" fill="url(#bg4)" rx="20"/>
  <!-- Pot -->
  <path d="M155 345 L162 385 L238 385 L245 345 Z" fill="#5d4037"/>
  <rect x="148" y="335" width="104" height="16" rx="6" fill="#795548"/>
