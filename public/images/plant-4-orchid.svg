  <path d="M200 340 C220 310 260 300 270 280" stroke="#558b2f" stroke-width="8" fill="none" stroke-linecap="round"/>
  <ellipse cx="125" cy="275" rx="30" ry="10" fill="url(#orchid-leaf)" transform="rotate(-20 125 275)"/>
  <ellipse cx="275" cy="275" rx="30" ry="10" fill="url(#orchid-leaf)" transform="rotate(20 275 275)"/>
  <!-- Flower stem -->
  <path d="M200 330 C200 280 190 240 180 200 C170 160 175 120 185 90" stroke="#558b2f" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Orchid flowers -->
  <g transform="translate(185,85)">
