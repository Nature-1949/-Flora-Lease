    <ellipse cx="-18" cy="5" rx="14" ry="18" fill="url(#petal4b)" transform="rotate(30 -18 5)"/>
    <ellipse cx="18" cy="5" rx="14" ry="18" fill="url(#petal4b)" transform="rotate(-30 18 5)"/>
    <ellipse cx="-10" cy="-12" rx="8" ry="14" fill="url(#petal4a)" transform="rotate(15 -10 -12)"/>
    <ellipse cx="10" cy="-12" rx="8" ry="14" fill="url(#petal4a)" transform="rotate(-15 10 -12)"/>
    <circle cx="0" cy="0" r="6" fill="#f9a825"/>
    <circle cx="0" cy="0" r="3" fill="#e65100" opacity="0.6"/>
  </g>
  <g transform="translate(178,130) scale(0.8)">
