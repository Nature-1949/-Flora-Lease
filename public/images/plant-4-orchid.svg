    <ellipse cx="-15" cy="4" rx="12" ry="15" fill="url(#petal4b)" transform="rotate(30 -15 4)"/>
    <ellipse cx="15" cy="4" rx="12" ry="15" fill="url(#petal4b)" transform="rotate(-30 15 4)"/>
